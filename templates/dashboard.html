<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Dashboard secrétariat — LREGE</title>
<style>
  :root{--bg:#f4f4f2;--card:#fff;--bord:#e0ddd5;--bord2:#cfcabf;--txt:#1f2328;--mut:#5f6b76;--info:#185fa5;--infobg:#e6f1fb;--ok:#2f7d4f;--okbg:#e9f5ee;--warn:#9a6a12;--warnbg:#fbf0d9;--err:#b3261e}
  *{box-sizing:border-box}
  body{font-family:system-ui,-apple-system,"Segoe UI",sans-serif;color:var(--txt);background:var(--bg);margin:0;padding:24px 14px;line-height:1.5}
  .wrap{max-width:920px;margin:0 auto}
  .card{background:var(--card);border:1px solid var(--bord);border-radius:12px;padding:16px 20px;margin-bottom:16px}
  h1{font-size:22px;font-weight:600;margin:0 0 4px}
  h2{font-size:17px;font-weight:600;margin:0}
  .mut{color:var(--mut);font-size:13px}
  .badge{font-size:12px;padding:3px 10px;border-radius:8px;display:inline-block}
  .ok{background:var(--okbg);color:var(--ok)}
  .warn{background:var(--warnbg);color:var(--warn)}
  .bar{height:8px;border-radius:6px;background:var(--bord);overflow:hidden;margin:8px 0}
  .bar>i{display:block;height:100%;background:var(--ok)}
  table{width:100%;border-collapse:collapse;margin-top:10px;font-size:14px}
  th,td{text-align:left;padding:6px 8px;border-top:1px solid var(--bord)}
  th{color:var(--mut);font-weight:600;font-size:12px;border-top:none}
  .stats{display:flex;gap:18px;flex-wrap:wrap;margin:6px 0 0;font-size:13px;color:var(--mut)}
  .stats b{color:var(--txt)}
  a.btn{font-size:13px;text-decoration:none;color:var(--info);border:1px solid var(--info);border-radius:8px;padding:5px 12px;display:inline-block}
  a.btn:hover{background:var(--infobg)}
  .head{display:flex;justify-content:space-between;align-items:flex-start;gap:12px;flex-wrap:wrap}
  tr.clubrow{cursor:pointer}
  tr.clubrow:hover td{background:var(--infobg)}
  .caret{display:inline-block;width:12px;color:var(--mut);transition:transform .15s}
  tr.clubrow.open .caret{transform:rotate(90deg)}
  tr.detail{display:none}
  tr.detail.open{display:table-row}
  tr.detail>td{background:#faf9f6;padding:0 8px 10px 26px}
  table.sub{margin:6px 0 2px;font-size:13px}
  table.sub th,table.sub td{border-top:1px solid var(--bord);padding:4px 8px}
  .badge.ko{background:#f6e4e3;color:var(--err)}
  .userbar{font-size:13px;color:var(--mut);display:flex;align-items:center;gap:12px}
  .userbar a{color:var(--info);text-decoration:none}
  details.grp{border:1px solid var(--bord);border-radius:10px;background:#fff;margin-bottom:12px}
  details.grp>summary{cursor:pointer;padding:9px 14px;list-style:none;display:flex;align-items:center;gap:10px;font-weight:600}
  details.grp>summary::-webkit-details-marker{display:none}
  details.grp>summary:before{content:"\25B8";color:var(--mut);font-weight:400;transition:transform .15s}
  details.grp[open]>summary:before{transform:rotate(90deg)}
  .gcount{font-size:12px;color:var(--mut);font-weight:400;margin-left:auto}
  details.grp-cat>summary{font-size:16px}
  details.grp-arme{border:none;border-top:1px solid var(--bord);border-radius:0;margin:0 0 0 14px}
  details.grp-arme>summary{font-size:14px;color:var(--info)}
  details.grp-type{border:none;border-radius:0;margin:0 0 0 16px}
  details.grp-type>summary{font-size:13px;color:var(--mut)}
  .grp-inner{padding:0 12px 6px}
  .grp-inner .card{box-shadow:none}
</style>
</head>
<body>
<div class="wrap">
  <div class="card head">
    <div><h1>Dashboard secrétariat</h1><p class="mut">Suivi des confirmations — Ligue Grand Est d'escrime</p></div>
    <div class="userbar">
      <span>{{ user.nom }}{% if user.role == 'admin' %} (admin){% endif %}</span>
      <a href="/logout">Déconnexion</a>
      <button onclick="charger()" style="font:inherit;padding:8px 14px;border:1px solid var(--bord2);border-radius:8px;background:#fff;cursor:pointer">Actualiser</button>
    </div>
  </div>
  <div id="loading" class="card mut">Chargement…</div>
  <div id="list"></div>
</div>

<script>
  function esc(s){ return (s==null?"":String(s)).replace(/[&<>]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[c])); }

  const CAT_ORDER = ['M13','M15','M17','M20','M23','Senior','Seniors','V1','V2','V3','V4','Veterans','Vétérans'];
  function catRank(c){ const i = CAT_ORDER.indexOf(c); return i < 0 ? 999 : i; }
  const ARME_ORDER = ['Fleuret','Épée','Sabre'];
  function armeLabel(a){
    const m = {E:'Épée',F:'Fleuret',S:'Sabre',epee:'Épée',fleuret:'Fleuret',sabre:'Sabre'};
    return m[a] || m[(a||'').toLowerCase()] || (a || '—');
  }
  function armeRank(a){ const i = ARME_ORDER.indexOf(a); return i < 0 ? 99 : i; }
  function typeLabel(f){ return f === 'equipe' ? 'Équipes' : (f === 'individuel' ? 'Individuel' : (f || '—')); }

  function groupTree(comps){
    const tree = {};
    comps.forEach(c => {
      const cat = c.categorie || '—', ar = armeLabel(c.arme), ty = typeLabel(c.format);
      if(!tree[cat]) tree[cat] = {};
      if(!tree[cat][ar]) tree[cat][ar] = {};
      if(!tree[cat][ar][ty]) tree[cat][ar][ty] = [];
      tree[cat][ar][ty].push(c);
    });
    return tree;
  }

  function details(cls){ const d = document.createElement('details'); d.className = cls; d.open = true; return d; }
  function summary(label, count){
    const s = document.createElement('summary');
    s.innerHTML = esc(label) + (count ? `<span class="gcount">${esc(count)}</span>` : '');
    return s;
  }

  async function charger(){
    const box = document.getElementById("list");
    const r = await fetch("/api/dashboard");
    if(r.status === 401){ window.location = "/login"; return; }
    if(!r.ok){ document.getElementById("loading").textContent = "Accès refusé."; return; }
    document.getElementById("loading").style.display = "none";
    const data = await r.json();
    box.innerHTML = "";
    if(!data.competitions.length){ box.innerHTML = '<div class="card mut">Aucune compétition.</div>'; return; }
    const tree = groupTree(data.competitions);
    Object.keys(tree).sort((a,b) => catRank(a) - catRank(b) || a.localeCompare(b)).forEach(cat => {
      const nComp = Object.values(tree[cat]).reduce((s,armeObj) =>
        s + Object.values(armeObj).reduce((n,arr) => n + arr.length, 0), 0);
      const dCat = details('grp grp-cat');
      dCat.appendChild(summary(cat, nComp + ' compétition' +
